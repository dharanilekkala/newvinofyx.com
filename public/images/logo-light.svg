<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 110" role="img" aria-label="VINOFYX PRIVATE LIMITED">
  <defs>
    <linearGradient id="mark" x1="5" y1="5" x2="72" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F5E6A8"/>
      <stop offset="42%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6D0D"/>
    </linearGradient>
    <radialGradient id="shine" cx="32%" cy="22%" r="58%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- White background -->
  <rect width="340" height="110" fill="#FFFFFF"/>

  <!-- V mark icon -->
  <polygon points="5,6 18,6 41,72 28,72" fill="url(#mark)"/>
  <polygon points="28,72 41,72 61,20 73,6 49,20" fill="url(#mark)"/>
  <polygon points="5,6 18,6 41,72 28,72" fill="url(#shine)"/>
  <polygon points="28,72 41,72 61,20 73,6 49,20" fill="url(#shine)"/>

  <!-- Wordmark -->
  <text x="94" y="52"
    font-family="'Helvetica Neue','Arial Black',Arial,sans-serif"
    font-weight="900" font-size="34" letter-spacing="3"
    fill="#111111">VINOFYX</text>

  <!-- PRIVATE LIMITED -->
  <text x="96" y="68"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-weight="400" font-size="9" letter-spacing="4.5"
    fill="#888888">PRIVATE LIMITED</text>

  <!-- Tagline -->
  <text x="96" y="88"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-weight="300" font-size="10.5" letter-spacing="0.5"
    fill="#B8930A" font-style="italic">Your Growth, Our Responsibility</text>
</svg>
